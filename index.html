<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gmail Daily Digest</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f2f4fb;
      --surface: #ffffff;
      --surf2:   #edf0f9;
      --border:  #dde1f2;
      --border2: #c8cde6;
      --text:    #1a1d30;
      --muted:   #6b729a;
      --muted2:  #9299bb;
      --must:    #d42b2b;
      --sched:   #c97000;
      --info:    #0a7a52;
      --link:    #1a5fd4;
      --r:       10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 28px 16px 60px;
    }

    .container { max-width: 820px; margin: 0 auto; }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }
    .header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .run-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 5px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .dry-badge {
      background: #fff3cd;
      color: #996600;
      border: 1px solid #f0d080;
      border-radius: 4px;
      padding: 1px 7px;
      font-size: 11px;
      font-weight: 700;
    }
    .btn {
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 7px 14px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background .12s, border-color .12s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--surf2); border-color: var(--muted2); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Date nav ── */
    .date-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .date-nav .btn { padding: 6px 12px; font-size: 12px; }
    .date-display {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 7px;
      padding: 6px 14px;
    }
    .today-btn {
      font-size: 11px;
      color: var(--link);
      background: none;
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      font-weight: 500;
    }
    .today-btn:hover { background: var(--surf2); }

    /* ── Stats ── */
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }
    .stat-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 13px;
      font-size: 12px;
      color: var(--muted);
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .stat-pill strong { color: var(--text); font-weight: 600; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

    /* ── Section ── */
    .section { margin-bottom: 28px; }
    .section-header {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 10px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-must  { background: var(--must); }
    .dot-sched { background: var(--sched); }
    .dot-info  { background: var(--info); }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .9px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .section-count {
      margin-left: auto;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1px 9px;
      font-size: 12px;
      color: var(--muted);
    }

    /* ── Item card ── */
    .item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 13px 15px;
      margin-bottom: 8px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
      transition: box-shadow .15s, border-color .15s;
    }
    .item:hover { box-shadow: 0 2px 8px rgba(0,0,0,.09); border-color: var(--border2); }

    .section-must     .item { border-left: 3px solid var(--must);  }
    .section-schedule .item { border-left: 3px solid var(--sched); }
    .section-info     .item { border-left: 3px solid var(--info);  }

    .item-body { flex: 1; min-width: 0; }

    .item-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 6px;
    }

    .item-row {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 3px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .item-row .label {
      font-weight: 600;
      color: var(--muted2);
      flex-shrink: 0;
    }
    .item-row .val {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 480px;
    }

    .snippet {
      font-size: 12px;
      color: var(--muted2);
      margin-top: 5px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .item-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 7px;
    }
    .due-tag {
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 11px;
      font-weight: 600;
    }
    .due-overdue { background: #fde8e8; color: var(--must);  border: 1px solid #f5bfbf; }
    .due-today   { background: #fff3e0; color: var(--sched); border: 1px solid #f5d990; }
    .due-soon    { background: #e8f0fe; color: var(--link);  border: 1px solid #bad0f8; }

    .open-link {
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 1px;
      color: var(--link);
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      border: 1px solid var(--border2);
      border-radius: 6px;
      background: var(--surface);
      transition: all .12s;
      white-space: nowrap;
    }
    .open-link:hover { background: #e8f0fe; border-color: var(--link); color: var(--link); }

    .empty {
      color: var(--muted);
      font-size: 13px;
      padding: 14px 16px;
      border: 1px dashed var(--border2);
      border-radius: var(--r);
      text-align: center;
      background: var(--surface);
    }

    /* ── Popover ── */
    #popover {
      position: fixed;
      z-index: 999;
      width: 340px;
      max-width: calc(100vw - 24px);
      background: #fff;
      border: 1px solid var(--border2);
      border-radius: 11px;
      box-shadow: 0 8px 28px rgba(0,0,0,.13), 0 2px 6px rgba(0,0,0,.06);
      padding: 14px 16px;
      pointer-events: none;
      opacity: 0;
      transform: translateY(5px);
      transition: opacity .14s ease, transform .14s ease;
    }
    #popover.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .pop-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .7px;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 2px;
    }
    .pop-val {
      font-size: 12px;
      color: var(--text);
      line-height: 1.45;
      word-break: break-word;
      margin-bottom: 9px;
    }
    .pop-divider { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
    .pop-body {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
      max-height: 110px;
      overflow-y: auto;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .pop-reason {
      font-size: 11px;
      color: var(--info);
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      line-height: 1.45;
    }
    @media (min-width: 768px) {
      #popover { padding: 16px 18px; }
      .pop-body { max-height: 160px; }
      .pop-val  { font-size: 13px; }
    }
    @media (min-width: 1200px) {
      #popover  { padding: 20px 22px; }
      .pop-body { max-height: 220px; font-size: 13px; }
      .pop-val  { font-size: 13px; }
      .pop-label { font-size: 11px; }
      .pop-reason { font-size: 12px; }
    }

    /* ── States ── */
    .loading {
      text-align: center;
      padding: 70px 0;
      font-size: 14px;
      color: var(--muted);
    }
    .error-msg {
      background: #fdf1f1;
      border: 1px solid #f5c0c0;
      border-radius: var(--r);
      color: var(--must);
      padding: 20px;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>
<body>
<div class="container">
  <div id="root"><div class="loading">Loading digest…</div></div>
</div>

<script>
const GMAIL_BASE = 'https://mail.google.com/mail/u/0/#all/';
let currentDate = getDateFromPath();
const itemStore = new Map();
let itemIdSeq = 0;

function getDateFromPath() {
  const seg = window.location.pathname.replace(/^\//, '').split('/')[0];
  return /^\d{4}-\d{2}-\d{2}$/.test(seg) ? seg : today();
}

function today() { return new Date().toISOString().slice(0, 10); }

function shiftDate(date, days) {
  const d = new Date(date + 'T12:00:00Z');
  d.setUTCDate(d.getUTCDate() + days);
  return d.toISOString().slice(0, 10);
}

function navigate(date) {
  currentDate = date;
  history.pushState({}, '', date === today() ? '/' : `/${date}`);
  init();
}

window.addEventListener('popstate', () => {
  currentDate = getDateFromPath();
  init();
});

async function load(date) {
  const r = await fetch(`/api/run/${date}`);
  if (r.ok) return r.json();
  if (r.status === 404 && date === today()) {
    const fb = await fetch('/api/latest-run');
    if (fb.ok) return fb.json();
  }
  const err = await r.json().catch(() => ({}));
  throw new Error(err.error || `HTTP ${r.status}`);
}

/* ── Rendering helpers ── */

function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtRunTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('en-AU', {
    weekday:'short', month:'short', day:'numeric',
    hour:'2-digit', minute:'2-digit', timeZoneName:'short'
  });
}

function dueBadge(due) {
  if (!due) return '';
  const [y,m,d] = due.split('-').map(Number);
  const target = new Date(y, m-1, d);
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.round((target - now) / 86400000);
  const label = target.toLocaleDateString('en-AU', { month:'short', day:'numeric' });
  if (diff < 0)  return `<span class="due-tag due-overdue">Overdue ${Math.abs(diff)}d</span>`;
  if (diff === 0) return `<span class="due-tag due-today">Due today</span>`;
  if (diff === 1) return `<span class="due-tag due-today">Due tomorrow</span>`;
  return `<span class="due-tag due-soon">Due ${label}</span>`;
}

function renderItem(item) {
  const id = String(++itemIdSeq);
  itemStore.set(id, item);

  const badge   = dueBadge(item.due_date);
  const gmailHref = item.thread_id ? `${GMAIL_BASE}${esc(item.thread_id)}` : '';
  const link    = gmailHref
    ? `<a class="open-link" href="${gmailHref}" target="_blank" rel="noopener">Open →</a>`
    : '';

  const fromRow = item.from
    ? `<div class="item-row"><span class="label">From</span><span class="val" title="${esc(item.from)}">${esc(item.from)}</span></div>`
    : '';

  const subjectRow = item.subject
    ? `<div class="item-row"><span class="label">Subject</span><span class="val" title="${esc(item.subject)}">${esc(item.subject)}</span></div>`
    : '';

  const snippetBlock = item.body_snippet
    ? `<div class="snippet">${esc(item.body_snippet)}</div>`
    : '';

  const tags = badge ? `<div class="item-tags">${badge}</div>` : '';

  return `
    <div class="item" data-id="${id}">
      <div class="item-body">
        <div class="item-title">${esc(item.title)}</div>
        ${fromRow}${subjectRow}${snippetBlock}${tags}
      </div>
      ${link}
    </div>`;
}

function renderSection(title, items, sectionClass, dotClass) {
  return `
    <div class="section ${sectionClass}">
      <div class="section-header">
        <div class="dot ${dotClass}"></div>
        <span class="section-label">${title}</span>
        <span class="section-count">${items.length}</span>
      </div>
      ${items.length ? items.map(renderItem).join('') : '<div class="empty">None</div>'}
    </div>`;
}

function pill(label, val) {
  if (val == null) return '';
  return `<div class="stat-pill">${label} <strong>${val}</strong></div>`;
}

function render(data, date) {
  itemStore.clear();
  itemIdSeq = 0;
  hidePop();
  if (data.error) {
    document.getElementById('root').innerHTML = `<div class="error-msg">⚠ ${esc(data.error)}</div>`;
    return;
  }

  const s    = data.stats || {};
  const must = data.must_do        || [];
  const sch  = data.schedule_later || [];
  const info = data.info_only      || [];
  const isToday = date === today();
  const isFuture = date > today();

  const nav = `
    <div class="date-nav">
      <button class="btn" onclick="navigate('${shiftDate(date,-1)}')">← Prev</button>
      <span class="date-display">${date}</span>
      ${!isFuture ? `<button class="btn" onclick="navigate('${shiftDate(date,1)}')" ${isToday?'disabled':''}>Next →</button>` : ''}
      ${!isToday ? `<button class="today-btn" onclick="navigate('${today()}')">Today</button>` : ''}
    </div>`;

  const stats = [
    pill('Pinned',              s.pin_to_inbox),
    pill('Updates read',        s.updates_marked_read),
    pill('Promotions archived', s.promotions_archived),
    pill('Starred',             s.starred_count),
    pill('Tasks created',       s.tasks_created),
    pill('Calendar events',     s.calendar_events),
  ].filter(Boolean).join('');

  document.getElementById('root').innerHTML = `
    <div class="header">
      <div>
        <h1>Gmail Daily Digest</h1>
        <div class="run-meta">
          ${esc(fmtRunTime(data.run_time))}
          ${data.dry_run ? '<span class="dry-badge">DRY RUN</span>' : ''}
        </div>
      </div>
      <button class="btn" id="refresh-btn" onclick="init()">↺ Refresh</button>
    </div>
    ${nav}
    <div class="stats">${stats}</div>
    <hr class="divider" />
    ${renderSection('Must Do',        must, 'section-must',     'dot-must')}
    ${renderSection('Schedule Later', sch,  'section-schedule', 'dot-sched')}
    ${renderSection('Info Only',      info, 'section-info',     'dot-info')}
  `;
}

async function init() {
  document.getElementById('root').innerHTML = '<div class="loading">Loading digest…</div>';
  try {
    const data = await load(currentDate);
    render(data, currentDate);
  } catch (e) {
    document.getElementById('root').innerHTML = `<div class="error-msg">⚠ ${esc(e.message)}</div>`;
  }
}

/* ── Popover ── */
const pop = document.createElement('div');
pop.id = 'popover';
document.body.appendChild(pop);
let hideTimer = null;

function popContent(item) {
  let html = '';
  if (item.from)    html += `<div class="pop-label">From</div><div class="pop-val">${esc(item.from)}</div>`;
  if (item.subject) html += `<div class="pop-label">Subject</div><div class="pop-val">${esc(item.subject)}</div>`;
  if (item.body_snippet) {
    html += `<div class="pop-divider"></div><div class="pop-body">${esc(item.body_snippet)}</div>`;
  }
  if (item.reason) {
    html += `<div class="pop-reason">AI: ${esc(item.reason)}</div>`;
  }
  return html;
}

function showPop(itemEl) {
  const item = itemStore.get(itemEl.dataset.id);
  if (!item) return;

  pop.innerHTML = popContent(item);

  const r         = itemEl.getBoundingClientRect();
  const container = document.querySelector('.container');
  const cr        = container ? container.getBoundingClientRect() : null;
  const vw        = window.innerWidth;
  const pw        = cr ? cr.width : (vw >= 768 ? Math.min(440, vw - 32) : Math.min(320, vw - 24));
  pop.style.width = pw + 'px';
  const ph  = pop.offsetHeight;
  const gap = 10;

  // Prefer above; fall back to below if not enough room
  const topAbove = r.top - ph - gap + window.scrollY;
  const topBelow = r.bottom + gap + window.scrollY;
  const top = (r.top - ph - gap > 8) ? topAbove : topBelow;

  // Align to container left edge when available, otherwise align to item
  const left = cr ? cr.left + window.scrollX : Math.max(8, Math.min(r.left + window.scrollX, window.scrollX + vw - pw - 8));

  pop.style.top  = top + 'px';
  pop.style.left = left + 'px';
  pop.classList.add('visible');
}

function hidePop() {
  pop.classList.remove('visible');
}

function schedHide() { hideTimer = setTimeout(hidePop, 120); }
function clearHide()  { clearTimeout(hideTimer); }

pop.addEventListener('mouseenter', clearHide);
pop.addEventListener('mouseleave', schedHide);

document.addEventListener('mouseover', e => {
  const itemEl = e.target.closest('[data-id]');
  if (itemEl) { clearHide(); showPop(itemEl); }
});
document.addEventListener('mouseout', e => {
  const itemEl = e.target.closest('[data-id]');
  if (itemEl && !itemEl.contains(e.relatedTarget) && !pop.contains(e.relatedTarget)) {
    schedHide();
  }
});

init();
</script>
</body>
</html>
