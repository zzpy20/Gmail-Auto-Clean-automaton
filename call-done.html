<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Call — Done</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f2f4fb;
      --surface: #ffffff;
      --surf2:   #edf0f9;
      --border:  #dde1f2;
      --border2: #c8cde6;
      --text:    #1a1d30;
      --muted:   #6b729a;
      --muted2:  #9299bb;
      --accent:  #0e6ebd;
      --link:    #1a5fd4;
      --r:       10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 28px 16px 60px;
    }

    .container { max-width: 820px; margin: 0 auto; }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }
    .header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .header-sub { font-size: 12px; color: var(--muted); margin-top: 5px; }

    .btn {
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 7px 14px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background .12s, border-color .12s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--surf2); border-color: var(--muted2); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .range-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .12s;
    }
    .range-btn:hover { background: var(--surf2); color: var(--text); }
    .range-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

    /* ── Item card ── */
    .item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--r);
      padding: 13px 15px;
      margin-bottom: 8px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
      transition: box-shadow .15s, border-color .15s;
      cursor: default;
    }
    .item:hover { box-shadow: 0 2px 8px rgba(0,0,0,.09); border-color: var(--border2); border-left-color: var(--accent); }

    .item-body { flex: 1; min-width: 0; }
    .item-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 5px;
    }
    .item-row {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 3px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .item-row .label { font-weight: 600; color: var(--muted2); flex-shrink: 0; }
    .item-row .val {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 500px;
    }
    .snippet {
      font-size: 12px;
      color: var(--muted2);
      margin-top: 5px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .open-link {
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 1px;
      color: var(--link);
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      border: 1px solid var(--border2);
      border-radius: 6px;
      background: var(--surface);
      transition: all .12s;
      white-space: nowrap;
    }
    .open-link:hover { background: #e8f0fe; border-color: var(--link); }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 24px;
    }
    .page-info { font-size: 13px; color: var(--muted); font-weight: 500; }

    /* ── States ── */
    .empty {
      color: var(--muted);
      font-size: 13px;
      padding: 40px 16px;
      text-align: center;
      background: var(--surface);
      border: 1px dashed var(--border2);
      border-radius: var(--r);
    }
    .loading { text-align: center; padding: 70px 0; font-size: 14px; color: var(--muted); }
    .error-msg {
      background: #fdf1f1;
      border: 1px solid #f5c0c0;
      border-radius: var(--r);
      color: #c0392b;
      padding: 20px;
      text-align: center;
      font-size: 14px;
    }

    /* ── Popover ── */
    #popover {
      position: fixed;
      z-index: 999;
      width: 340px;
      max-width: calc(100vw - 24px);
      background: #fff;
      border: 1px solid var(--border2);
      border-radius: 11px;
      box-shadow: 0 8px 28px rgba(0,0,0,.13), 0 2px 6px rgba(0,0,0,.06);
      padding: 14px 16px;
      pointer-events: none;
      opacity: 0;
      transform: translateY(5px);
      transition: opacity .14s ease, transform .14s ease;
    }
    #popover.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .pop-label { font-size: 10px; font-weight: 700; letter-spacing: .7px; text-transform: uppercase; color: var(--muted2); margin-bottom: 2px; }
    .pop-val   { font-size: 12px; color: var(--text); line-height: 1.45; word-break: break-word; margin-bottom: 9px; }
    .pop-divider { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
    .pop-body  { font-size: 12px; color: var(--muted); line-height: 1.6; max-height: 110px; overflow-y: auto; word-break: break-word; white-space: pre-wrap; }
    @media (min-width: 768px)  { #popover { padding: 16px 18px; } .pop-body { max-height: 160px; } .pop-val { font-size: 13px; } }
    @media (min-width: 1200px) { #popover { padding: 20px 22px; } .pop-body { max-height: 220px; font-size: 13px; } .pop-label { font-size: 11px; } }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>! Call — Done</h1>
      <div class="header-sub">Emails from the <strong>! Call - Done</strong> Gmail label</div>
    </div>
    <button class="btn" onclick="reload()">↺ Refresh</button>
  </div>

  <div class="filter-bar">
    <button class="range-btn" data-range="week"   onclick="setRange('week')">Within a week</button>
    <button class="range-btn" data-range="month"  onclick="setRange('month')">1 month</button>
    <button class="range-btn" data-range="3month" onclick="setRange('3month')">3 months</button>
    <button class="range-btn active" data-range="all" onclick="setRange('all')">All</button>
  </div>

  <hr class="divider" />
  <div id="root"><div class="loading">Loading…</div></div>
</div>

<script>
const GMAIL_BASE = 'https://mail.google.com/mail/u/0/#all/';
let currentRange = 'all';
let currentPage  = 0;
const itemStore  = new Map();
let itemIdSeq    = 0;

function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleString('en-AU', {
    day:'numeric', month:'short', year:'numeric',
    hour:'2-digit', minute:'2-digit'
  });
}

function setRange(range) {
  currentRange = range;
  currentPage  = 0;
  document.querySelectorAll('.range-btn').forEach(b => b.classList.toggle('active', b.dataset.range === range));
  load();
}

function goPage(page) {
  currentPage = page;
  load();
}

function reload() { load(); }

async function fetchData(range, page) {
  const r = await fetch(`/api/call-done?range=${range}&page=${page}`);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

function renderItem(item) {
  const id = String(++itemIdSeq);
  itemStore.set(id, item);

  const gmailHref = item.thread_id ? `${GMAIL_BASE}${esc(item.thread_id)}` : '';
  const link = gmailHref
    ? `<a class="open-link" href="${gmailHref}" target="_blank" rel="noopener">Open →</a>`
    : '';

  const fromRow    = item.from    ? `<div class="item-row"><span class="label">From</span><span class="val" title="${esc(item.from)}">${esc(item.from)}</span></div>` : '';
  const dateRow    = item.date    ? `<div class="item-row"><span class="label">Date</span><span class="val">${esc(fmtDate(item.date))}</span></div>` : '';
  const snippetBlock = item.snippet ? `<div class="snippet">${esc(item.snippet)}</div>` : '';

  return `
    <div class="item" data-id="${id}">
      <div class="item-body">
        <div class="item-title">${esc(item.subject || '(no subject)')}</div>
        ${fromRow}${dateRow}${snippetBlock}
      </div>
      ${link}
    </div>`;
}

function render(data) {
  itemStore.clear();
  itemIdSeq = 0;
  hidePop();

  const items = data.items || [];

  if (!items.length) {
    document.getElementById('root').innerHTML = '<div class="empty">No emails found for this date range.</div>';
    return;
  }

  const cards = items.map(renderItem).join('');

  const prevDisabled = currentPage === 0 ? 'disabled' : '';
  const nextDisabled = !data.has_more ? 'disabled' : '';

  const pagination = `
    <div class="pagination">
      <button class="btn" onclick="goPage(${currentPage - 1})" ${prevDisabled}>← Prev</button>
      <span class="page-info">Page ${currentPage + 1}</span>
      <button class="btn" onclick="goPage(${currentPage + 1})" ${nextDisabled}>Next →</button>
    </div>`;

  document.getElementById('root').innerHTML = cards + pagination;
}

async function load() {
  document.getElementById('root').innerHTML = '<div class="loading">Loading…</div>';
  try {
    const data = await fetchData(currentRange, currentPage);
    render(data);
  } catch (e) {
    document.getElementById('root').innerHTML = `<div class="error-msg">⚠ ${esc(e.message)}</div>`;
  }
}

/* ── Popover ── */
const pop = document.createElement('div');
pop.id = 'popover';
document.body.appendChild(pop);
let hideTimer = null;

function popContent(item) {
  let html = '';
  if (item.from)    html += `<div class="pop-label">From</div><div class="pop-val">${esc(item.from)}</div>`;
  if (item.subject) html += `<div class="pop-label">Subject</div><div class="pop-val">${esc(item.subject)}</div>`;
  if (item.date)    html += `<div class="pop-label">Date</div><div class="pop-val">${esc(fmtDate(item.date))}</div>`;
  if (item.snippet) html += `<div class="pop-divider"></div><div class="pop-body">${esc(item.snippet)}</div>`;
  return html;
}

function showPop(itemEl) {
  const item = itemStore.get(itemEl.dataset.id);
  if (!item) return;

  pop.innerHTML = popContent(item);

  const r   = itemEl.getBoundingClientRect();
  const container = document.querySelector('.container');
  const cr  = container ? container.getBoundingClientRect() : null;
  const vw  = window.innerWidth;
  const pw  = cr ? cr.width : (vw >= 768 ? Math.min(440, vw - 32) : Math.min(320, vw - 24));
  pop.style.width = pw + 'px';
  const ph  = pop.offsetHeight;
  const gap = 10;

  const top = (r.top - ph - gap > 8)
    ? r.top - ph - gap + window.scrollY
    : r.bottom + gap + window.scrollY;
  const left = cr
    ? cr.left + window.scrollX
    : Math.max(8, Math.min(r.left + window.scrollX, window.scrollX + vw - pw - 8));

  pop.style.top  = top + 'px';
  pop.style.left = left + 'px';
  pop.classList.add('visible');
}

function hidePop() { pop.classList.remove('visible'); }
function schedHide() { hideTimer = setTimeout(hidePop, 120); }
function clearHide() { clearTimeout(hideTimer); }

pop.addEventListener('mouseenter', clearHide);
pop.addEventListener('mouseleave', schedHide);

document.addEventListener('mouseover', e => {
  const itemEl = e.target.closest('[data-id]');
  if (itemEl) { clearHide(); showPop(itemEl); }
});
document.addEventListener('mouseout', e => {
  const itemEl = e.target.closest('[data-id]');
  if (itemEl && !itemEl.contains(e.relatedTarget) && !pop.contains(e.relatedTarget)) schedHide();
});

load();
</script>
</body>
</html>
